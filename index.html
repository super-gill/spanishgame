<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spanish Practice</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fbf8f3;
    color: #1a2332;
    padding: 1.25rem;
    line-height: 1.5;
    min-height: 100vh;
  }
  .container { max-width: 720px; margin: 0 auto; }

  /* Header */
  header {
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid #d5cfc1;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
  }
  h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 400;
    font-size: 1.75rem;
    letter-spacing: -0.01em;
  }
  .back-btn {
    background: transparent;
    border: none;
    color: #7a7466;
    font-family: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    padding: 0.25rem 0.5rem;
  }
  .back-btn:hover { color: #1a2332; }
  .back-btn.hidden { display: none; }

  /* Home view */
  .stats-overview {
    background: white;
    border: 1px solid #d5cfc1;
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    font-size: 0.85rem;
  }
  .stat-block { display: flex; flex-direction: column; }
  .stat-label { color: #7a7466; font-size: 0.78rem; }
  .stat-value { font-family: Georgia, serif; font-size: 1.5rem; color: #1a2332; }
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.85rem;
  }
  .game-card {
    background: white;
    border: 1px solid #d5cfc1;
    border-radius: 10px;
    padding: 1rem 1.25rem;
    text-align: left;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .game-card:hover {
    border-color: #1a2332;
    transform: translateY(-1px);
  }
  .game-card-title {
    font-family: Georgia, serif;
    font-size: 1.1rem;
    color: #1a2332;
    margin-bottom: 0.25rem;
  }
  .game-card-desc {
    font-size: 0.8rem;
    color: #7a7466;
    margin-bottom: 0.5rem;
  }
  .game-card-stats {
    font-size: 0.75rem;
    color: #5a5446;
  }

  /* Game view shared */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1.5rem;
  }
  .filter-btn {
    padding: 0.4rem 0.85rem;
    background: transparent;
    border: 1px solid #d5cfc1;
    border-radius: 999px;
    color: #1a2332;
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: #1a2332; }
  .filter-btn.active {
    background: #1a2332;
    color: #fbf8f3;
    border-color: #1a2332;
  }
  .prompt-card {
    background: white;
    border: 1px solid #d5cfc1;
    border-radius: 12px;
    padding: 1.75rem 1.5rem;
    margin-bottom: 1rem;
    text-align: center;
  }
  .prompt-main {
    font-family: Georgia, serif;
    font-size: 2rem;
    font-weight: 500;
    margin-bottom: 0.25rem;
    letter-spacing: -0.01em;
  }
  .prompt-meta {
    font-size: 0.85rem;
    color: #7a7466;
    margin-bottom: 1.25rem;
  }
  .prompt-ask { font-size: 0.95rem; color: #1a2332; margin-bottom: 0.5rem; }
  .prompt-target {
    font-family: Georgia, serif;
    font-size: 1.4rem;
    color: #c2624a;
  }
  .input-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  input[type="text"] {
    flex: 1;
    padding: 0.85rem 1rem;
    font-size: 1.1rem;
    font-family: inherit;
    border: 1px solid #d5cfc1;
    border-radius: 8px;
    background: white;
    color: #1a2332;
    min-width: 0;
  }
  input[type="text"]:focus { outline: none; border-color: #1a2332; }
  button.primary {
    padding: 0.85rem 1.5rem;
    background: #1a2332;
    color: #fbf8f3;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-family: inherit;
    cursor: pointer;
    flex-shrink: 0;
  }
  button.primary:hover { background: #2a3343; }
  button.primary:disabled { background: #b5b0a3; cursor: not-allowed; }
  .feedback {
    padding: 1rem 1.25rem;
    border-radius: 8px;
    margin-bottom: 1rem;
    font-size: 0.95rem;
  }
  .feedback.correct { background: #e8f1e6; color: #2d5a2d; border-left: 3px solid #3a7a3a; }
  .feedback.almost  { background: #fdf6e3; color: #7a5a1f; border-left: 3px solid #d4a849; }
  .feedback.incorrect { background: #fce8e8; color: #7a2d2d; border-left: 3px solid #a33838; }
  .feedback strong { font-weight: 600; }

  /* Hint button — for hiding translations behind a "cheat" reveal */
  .hint-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    margin: -0.5rem 0 1.25rem 0;
    min-height: 1.6rem;
  }
  .hint-btn {
    background: transparent;
    border: 1px solid #d5cfc1;
    color: #7a7466;
    padding: 0.2rem 0.7rem;
    border-radius: 999px;
    font-size: 0.78rem;
    font-family: inherit;
    cursor: pointer;
  }
  .hint-btn:hover { color: #1a2332; border-color: #1a2332; }
  .hint-text {
    font-size: 0.85rem;
    color: #7a7466;
    font-style: italic;
  }
  .hint-text.hidden { display: none; }
  .hint-btn.hidden { display: none; }

  /* Multiple choice options */
  .option-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-bottom: 1rem;
  }
  .option-btn {
    padding: 0.85rem 1rem;
    background: white;
    border: 1px solid #d5cfc1;
    border-radius: 8px;
    font-size: 1rem;
    font-family: inherit;
    cursor: pointer;
    color: #1a2332;
    transition: all 0.1s;
  }
  .option-btn:hover { border-color: #1a2332; }
  .option-btn.correct { background: #e8f1e6; border-color: #3a7a3a; color: #2d5a2d; }
  .option-btn.incorrect { background: #fce8e8; border-color: #a33838; color: #7a2d2d; }
  .option-btn:disabled { cursor: default; }

  /* Big binary options (el/la) */
  .binary-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .binary-options .option-btn {
    padding: 1.5rem;
    font-family: Georgia, serif;
    font-size: 1.75rem;
  }

  /* Recognition game */
  .recog-word {
    font-family: Georgia, serif;
    font-size: 2.5rem;
    text-align: center;
    padding: 2rem 1rem 1rem;
  }
  .recog-reveal-area {
    margin: 1rem 0;
    padding: 1rem 1.25rem;
    background: #f7f3eb;
    border: 1px solid #d5cfc1;
    border-radius: 8px;
    min-height: 1rem;
  }
  .recog-reveal-area.hidden { display: none; }
  .recog-meaning {
    font-size: 1.25rem;
    color: #1a2332;
    margin-bottom: 0.5rem;
  }
  .recog-meta {
    font-size: 0.9rem;
    color: #5a5040;
    margin-bottom: 0.4rem;
  }
  .recog-sample {
    font-family: Georgia, serif;
    font-size: 0.95rem;
    color: #3a3525;
    font-style: italic;
    margin-top: 0.5rem;
    line-height: 1.5;
  }
  .rate-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
    margin-top: 1rem;
  }
  .rate-row.binary {
    grid-template-columns: repeat(2, 1fr);
  }
  .rate-btn {
    padding: 0.85rem 0.5rem;
    background: white;
    border: 1px solid #d5cfc1;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: inherit;
    cursor: pointer;
    color: #1a2332;
  }
  .rate-btn:hover { border-color: #1a2332; }
  .rate-btn.knew { border-color: #3a7a3a; color: #2d5a2d; }
  .rate-btn.knew:hover { background: #e8f1e6; }
  .rate-btn.fuzzy { border-color: #9a7a2a; color: #6a5a1a; }
  .rate-btn.fuzzy:hover { background: #f3edd8; }
  .rate-btn.didnt { border-color: #a33838; color: #7a2d2d; }
  .rate-btn.didnt:hover { background: #fce8e8; }

  /* Sentence parse mode */
  .recog-sentence {
    font-family: Georgia, serif;
    font-size: 1.4rem;
    line-height: 2.2;
    padding: 1.5rem 1rem;
    text-align: center;
  }
  .word-chip {
    display: inline-block;
    padding: 0.15rem 0.4rem;
    margin: 0.1rem 0.1rem;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.1s;
    border-bottom: 1px dotted transparent;
  }
  .word-chip:hover {
    background: #f0e9d6;
    border-bottom-color: #8a7a4a;
  }
  .word-chip.active {
    background: #e3d8b3;
    border-bottom-color: #8a7a4a;
  }
  .word-chip.unknown {
    color: #8a7a6a;
  }
  .word-popover {
    background: #1a2332;
    color: #f5f0e3;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    margin: 0.75rem 0;
    font-size: 0.95rem;
    line-height: 1.5;
  }
  .word-popover .pop-word {
    font-family: Georgia, serif;
    font-size: 1.1rem;
    font-weight: bold;
    margin-bottom: 0.2rem;
  }
  .word-popover .pop-meta {
    color: #c5b8a0;
    font-size: 0.85rem;
  }
  .recog-mode-toggle {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .recog-mode-toggle .filter-btn {
    flex: 1;
  }

  /* Tile builder */
  .tile-target {
    min-height: 4rem;
    background: white;
    border: 2px dashed #d5cfc1;
    border-radius: 8px;
    padding: 0.75rem;
    margin-bottom: 0.75rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    align-items: center;
  }
  .tile-bank {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1rem;
    padding: 0.75rem;
    background: #f0ebe1;
    border-radius: 8px;
    min-height: 3rem;
  }
  .tile {
    padding: 0.5rem 0.85rem;
    background: white;
    border: 1px solid #d5cfc1;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.95rem;
    cursor: pointer;
    color: #1a2332;
  }
  .tile:hover { border-color: #1a2332; }
  .tile.placed { background: #1a2332; color: #fbf8f3; }

  /* Place-action checkbox grid */
  .check-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .check-item {
    padding: 0.65rem 0.85rem;
    background: white;
    border: 1px solid #d5cfc1;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    color: #1a2332;
    text-align: left;
  }
  .check-item.selected { background: #1a2332; color: #fbf8f3; border-color: #1a2332; }
  .check-item.true-positive { background: #e8f1e6; border-color: #3a7a3a; color: #2d5a2d; }
  .check-item.false-positive { background: #fce8e8; border-color: #a33838; color: #7a2d2d; }
  .check-item.missed { background: #fdf6e3; border-color: #d4a849; color: #7a5a1f; }

  /* Stats area inside game */
  .game-stats {
    font-size: 0.85rem;
    color: #7a7466;
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid #d5cfc1;
  }
  .stats-row { display: flex; justify-content: space-between; margin-bottom: 0.25rem; }
  .stats-row strong { color: #1a2332; font-weight: 600; }
  .weak-spots-title { font-weight: 600; margin-top: 0.75rem; margin-bottom: 0.35rem; color: #1a2332; font-size: 0.85rem; }
  .weak-spot {
    display: inline-block;
    padding: 0.2rem 0.55rem;
    margin: 0.15rem 0.2rem 0.15rem 0;
    background: #f0ebe1;
    border-radius: 4px;
    font-size: 0.78rem;
    color: #5a5446;
  }

  /* Dialogue */
  .dialogue-turn {
    padding: 0.85rem 1rem;
    margin-bottom: 0.5rem;
    border-radius: 8px;
    background: white;
    border: 1px solid #d5cfc1;
  }
  .dialogue-turn.you { border-left: 3px solid #c2624a; }
  .dialogue-turn.other { border-left: 3px solid #7a7466; background: #f0ebe1; }
  .dialogue-speaker {
    font-size: 0.78rem;
    font-weight: 600;
    color: #7a7466;
    margin-bottom: 0.2rem;
  }
  .dialogue-text { font-size: 0.95rem; }
  .dialogue-english { font-size: 0.85rem; color: #7a7466; font-style: italic; margin-top: 0.25rem; }

  .empty-state {
    text-align: center;
    padding: 2rem;
    color: #7a7466;
    background: white;
    border: 1px dashed #d5cfc1;
    border-radius: 10px;
  }

  .hidden { display: none !important; }

  @media (max-width: 480px) {
    .prompt-main { font-size: 1.65rem; }
    .input-row { flex-direction: column; }
    button.primary { width: 100%; }
    .option-grid { grid-template-columns: 1fr; }
    .games-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

  <main id="main"></main>

// =============================================================================
// STORAGE
// =============================================================================
const STORAGE_KEY = 'jason-spanish-app-v1';
const GAME_KEYS = ['verbs','vocab','sentenceBuilder','fillBlank','articles','timeNumbers','placeAction','dialogue','recognition'];

// Use null-prototype objects so keys like "constructor", "toString", etc.
// don't collide with Object.prototype properties.
function makeProgress() {
  const p = Object.create(null);
  GAME_KEYS.forEach(k => { p[k] = Object.create(null); });
  return p;
}
let progress = makeProgress();

// Storage adapter: prefer the Claude artifacts window.storage API when present
// (claude.ai). Otherwise fall back to localStorage so progress persists when the
// app is hosted (e.g. GitHub Pages) or opened as a local file. In the artifacts
// environment window.storage exists, so localStorage is never touched there.
const Store = {
  async get(k) {
    if (typeof window !== 'undefined' && window.storage && window.storage.get) {
      return await window.storage.get(k);
    }
    try { const v = localStorage.getItem(k); return v == null ? null : { value: v }; }
    catch (e) { return null; }
  },
  async set(k, v) {
    if (typeof window !== 'undefined' && window.storage && window.storage.set) {
      return await window.storage.set(k, v);
    }
    try { localStorage.setItem(k, v); } catch (e) {}
  }
};

async function loadProgress() {
  try {
    const r = await Store.get(STORAGE_KEY);
    if (r && r.value) {
      const loaded = JSON.parse(r.value);
      const fresh = makeProgress();
      for (const game of GAME_KEYS) {
        if (loaded[game] && typeof loaded[game] === 'object') {
          for (const key of Object.keys(loaded[game])) {
            fresh[game][key] = loaded[game][key];
          }
        }
      }
      progress = fresh;
    }
  } catch (e) {}
}

async function saveProgress() {
  try { await Store.set(STORAGE_KEY, JSON.stringify(progress)); }
  catch (e) { /* storage unavailable; progress stays in memory for this session */ }
}

// =============================================================================
// UTILITIES
// =============================================================================
function normalize(s) {
  return s.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function recordResult(game, key, correct) {
  if (!progress[game][key]) progress[game][key] = { correct: 0, incorrect: 0 };
  if (correct) progress[game][key].correct++;
  else progress[game][key].incorrect++;
  saveProgress();
}

function pickWeighted(items, weightFn) {
  if (items.length === 0) return null;
  const weights = items.map(weightFn);
  // Safety: if any weight is not a finite positive number, fall back to uniform random.
  if (!weights.every(w => Number.isFinite(w) && w > 0)) {
    return items[Math.floor(Math.random() * items.length)];
  }
  const total = weights.reduce((a,b) => a+b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < items.length; i++) {
    r -= weights[i];
    if (r <= 0) return items[i];
  }
  return items[items.length - 1];
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function weightForKey(gameKey, itemKey) {
  const s = progress[gameKey][itemKey];
  // Defensive: only treat s as stats if it's an actual stats object.
  // Protects against prototype-pollution and corrupted storage.
  if (!s || typeof s !== 'object' || typeof s.correct !== 'number' || typeof s.incorrect !== 'number') return 3;
  const total = s.correct + s.incorrect;
  if (total === 0) return 3;
  const acc = s.correct / total;
  return 1 + (1 - acc) * 4;
}

function gameAggregateStats(gameKey) {
  let c = 0, i = 0;
  Object.values(progress[gameKey]).forEach(s => {
    if (s && typeof s === 'object' && typeof s.correct === 'number' && typeof s.incorrect === 'number') {
      c += s.correct; i += s.incorrect;
    }
  });
  return { correct: c, incorrect: i, total: c + i };
}

function weakSpotsForGame(gameKey, formatFn) {
  const items = [];
  Object.keys(progress[gameKey]).forEach(key => {
    const s = progress[gameKey][key];
    if (!s || typeof s !== 'object' || typeof s.correct !== 'number' || typeof s.incorrect !== 'number') return;
    const t = s.correct + s.incorrect;
    if (t >= 2 && s.correct / t < 0.7) items.push({ key, acc: s.correct/t, total: t });
  });
  items.sort((a,b) => a.acc - b.acc);
  return items.slice(0, 8).map(formatFn);
}

// =============================================================================
// NAVIGATION
// =============================================================================
let currentGame = null;

function navigateTo(view) {
  const back = document.getElementById('back-btn');
  const title = document.getElementById('page-title');
  if (view === 'home') {
    currentGame = null;
    back.classList.add('hidden');
    title.textContent = 'Spanish Practice';
    renderHome();
  } else {
    currentGame = view;
    back.classList.remove('hidden');
    title.textContent = Games[view].name;
    Games[view].init();
  }
}

document.getElementById('back-btn').addEventListener('click', () => navigateTo('home'));

// =============================================================================
// HOME VIEW
// =============================================================================
function renderHome() {
  let totalC = 0, totalI = 0;
  Object.keys(progress).forEach(g => {
    const s = gameAggregateStats(g);
    totalC += s.correct; totalI += s.incorrect;
  });
  const total = totalC + totalI;
  const acc = total > 0 ? Math.round((totalC / total) * 100) + '%' : '—';

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="stats-overview">
      <div class="stat-block">
        <div class="stat-label">Total attempts</div>
        <div class="stat-value">${total}</div>
      </div>
      <div class="stat-block">
        <div class="stat-label">Overall accuracy</div>
        <div class="stat-value">${acc}</div>
      </div>
    </div>
    <div class="games-grid">
      ${Object.keys(Games).map(key => {
        const g = Games[key];
        const s = gameAggregateStats(key);
        const a = s.total > 0 ? Math.round((s.correct/s.total)*100) + '% • ' + s.total + ' attempts' : 'Not started yet';
        return `<button class="game-card" data-game="${key}">
          <div class="game-card-title">${g.name}</div>
          <div class="game-card-desc">${g.description}</div>
          <div class="game-card-stats">${a}</div>
        </button>`;
      }).join('')}
    </div>
  `;
  main.querySelectorAll('.game-card').forEach(card => {
    card.addEventListener('click', () => navigateTo(card.dataset.game));
  });
}

Games.verbs = {
  name: 'Verb Drill',
  description: 'Conjugation across persons and tenses',
  state: { mode: 'all', awaitingNext: false, currentCombo: null },

  PERSONS: ['yo','tu','el','nos','vos','ellos'],
  PERSON_LABELS: {yo:'yo (I)', tu:'tú (you)', el:'él/ella (he/she)', nos:'nosotros (we)', vos:'vosotros (you all)', ellos:'ellos (they)'},
  TENSE_LABELS: {present:'present', past:'past (preterite)'},
  CAT_LABELS: {'reg-ar':'regular -AR','reg-er':'regular -ER','reg-ir':'regular -IR','stem-ie':'E→IE stem','stem-ue':'O→UE stem','stem-i':'E→I stem','irreg':'irregular','reflexive':'reflexive'},

  init() {
    this.state = { mode: 'all', awaitingNext: false, currentCombo: null };
    const main = document.getElementById('main');
    main.innerHTML = `
      <div class="controls">
        <button class="filter-btn active" data-mode="all">All</button>
        <button class="filter-btn" data-mode="present">Present only</button>
        <button class="filter-btn" data-mode="past">Past only</button>

      <div class="prompt-card">
        <div class="prompt-main" id="verb-display">—</div>
        <div class="prompt-meta" id="verb-meta">—</div>
        <div class="prompt-ask">Conjugate for:</div>
        <div class="prompt-target" id="person-display">—</div>
      </div>
      <div class="hint-row" id="verb-hint-row">
        <button class="hint-btn">Show meaning</button>
        <span class="hint-text hidden" id="verb-hint-text"></span>
      </div>
      <div class="input-row">
        <input type="text" id="answer-input" placeholder="Type the conjugation" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button class="primary" id="submit-btn">Check</button>
      </div>
      <div id="feedback-area"></div>
      ${this.renderStatsBlock()}
    `;
    main.querySelectorAll('.filter-btn').forEach(b => b.addEventListener('click', () => this.setMode(b.dataset.mode)));
    document.getElementById('submit-btn').addEventListener('click', () => this.check());
    document.getElementById('answer-input').addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); this.check(); }});
    this.next();
  },

  renderStatsBlock() {
    const s = gameAggregateStats('verbs');
    const acc = s.total > 0 ? Math.round((s.correct/s.total)*100) + '%' : '—';
    const weak = weakSpotsForGame('verbs', it => {
      const [verb, person, tense] = it.key.split(':');
      return `<span class="weak-spot">${verb} • ${person} • ${tense} (${Math.round(it.acc*100)}%)</span>`;
    });
    return `<div class="game-stats" id="stats-block">
      <div class="stats-row"><span>Attempts</span><strong>${s.total}</strong></div>
      <div class="stats-row"><span>Accuracy</span><strong>${acc}</strong></div>
      <div class="weak-spots-title">Weak spots</div>
      <div>${weak.length ? weak.join('') : (s.total > 0 ? 'None showing yet.' : 'None yet, keep going.')}</div>
    </div>`;
  },

  refreshStatsBlock() {
    const block = document.getElementById('stats-block');
    if (block) block.outerHTML = this.renderStatsBlock();
  },

  setMode(mode) {
    this.state.mode = mode;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    this.next();
  },

  getActiveTenses() {
    if (this.state.mode === 'present') return ['present'];
    if (this.state.mode === 'past') return ['past'];
    return ['present','past'];
  },

  pick() {
    const activeTenses = this.getActiveTenses();
    let pool = DATA.verbs.filter(v => activeTenses.some(t => v.conj[t]));
    if (this.state.mode === 'regular') pool = pool.filter(v => v.cat.startsWith('reg-'));

    const combos = [];
    pool.forEach(verb => {
      Object.keys(verb.conj).forEach(tense => {
        if (!activeTenses.includes(tense)) return;
        this.PERSONS.forEach(person => combos.push({ verb, tense, person }));
      });
    });

    if (this.state.mode === 'weak') {
      const weakCombos = combos.filter(c => {
        const k = `${c.verb.inf}:${c.person}:${c.tense}`;
        const s = progress.verbs[k];
        if (!s || s.correct + s.incorrect < 2) return false;
        return s.correct / (s.correct + s.incorrect) < 0.7;
      });
      if (weakCombos.length > 0) return pickWeighted(weakCombos, c => 1);
    }
    return pickWeighted(combos, c => weightForKey('verbs', `${c.verb.inf}:${c.person}:${c.tense}`));
  },

  next() {
    const combo = this.pick();
    this.state.currentCombo = combo;
    document.getElementById('verb-display').textContent = combo.verb.inf;
    document.getElementById('verb-meta').textContent = `${this.CAT_LABELS[combo.verb.cat]} • ${this.TENSE_LABELS[combo.tense]}`;
    document.getElementById('verb-hint-text').textContent = combo.verb.en;
    document.getElementById('verb-hint-text').classList.add('hidden');
    document.getElementById('verb-hint-row').querySelector('.hint-btn').classList.remove('hidden');
    document.getElementById('person-display').textContent = this.PERSON_LABELS[combo.person];
    const input = document.getElementById('answer-input');
    input.value = ''; input.focus();
    document.getElementById('feedback-area').innerHTML = '';
    document.getElementById('submit-btn').textContent = 'Check';
    this.state.awaitingNext = false;
  },

  check() {
    if (this.state.awaitingNext) { this.next(); this.refreshStatsBlock(); return; }
    const input = document.getElementById('answer-input').value.trim();
    if (!input) return;
    const c = this.state.currentCombo;
    const expected = c.verb.conj[c.tense][c.person];
    const key = `${c.verb.inf}:${c.person}:${c.tense}`;
    const nu = normalize(input), ne = normalize(expected);
    let fb;
    if (input.toLowerCase() === expected.toLowerCase()) {
      recordResult('verbs', key, true);
      fb = `<div class="feedback correct">✓ Correct: <strong>${expected}</strong></div>`;
    } else if (nu === ne) {
      recordResult('verbs', key, true);
      fb = `<div class="feedback almost">Nearly. Your spelling matches but the accent matters: <strong>${expected}</strong>. In Spanish, accents can change meaning (e.g. <em>hablo</em> = I speak, <em>habló</em> = he/she spoke).</div>`;
    } else {
      recordResult('verbs', key, false);
      fb = `<div class="feedback incorrect">✗ The correct form is <strong>${expected}</strong>. You wrote "<em>${input}</em>".</div>`;
    }
    document.getElementById('feedback-area').innerHTML = fb;
    document.getElementById('submit-btn').textContent = 'Next';
    this.state.awaitingNext = true;
  }
};

    document.querySelectorAll('[data-input]').forEach(b => b.classList.toggle('active', b.dataset.input === m));
    this.next();
  },

  pool() {
    if (this.state.topic === 'all') {
      return Object.entries(DATA.vocab).flatMap(([t, list]) => list.map(p => ({...p, topic:t})));
    }
    return DATA.vocab[this.state.topic].map(p => ({...p, topic: this.state.topic}));
  },

  next() {
    const pool = this.pool();
    const word = pickWeighted(pool, p => weightForKey('vocab', p.es));
    this.state.current = word;
    document.getElementById('vocab-prompt').textContent = word.en;
    document.getElementById('vocab-meta').textContent = `topic: ${word.topic}`;

    this.state.awaitingNext = false;

    const area = document.getElementById('vocab-input-area');
    if (this.state.mode === 'choice') {
      const distractors = shuffle(pool.filter(p => p.es !== word.es)).slice(0, 3);
      const options = shuffle([word, ...distractors]);
      area.innerHTML = `<div class="option-grid">${options.map(o => `<button class="option-btn" data-value="${o.es}">${o.es}</button>`).join('')}</div>`;

        </div>`;

      document.getElementById('vocab-submit').addEventListener('click', () => this.check(input.value.trim()));
    }
  },

  check(answer, clickedBtn) {
    if (this.state.awaitingNext) { this.next(); this.refreshStatsBlock(); return; }
    if (!answer) return;
    const expected = this.state.current.es;
    const nu = normalize(answer), ne = normalize(expected);
    let fb;
    if (answer.toLowerCase() === expected.toLowerCase()) {
      recordResult('vocab', expected, true);
      fb = `<div class="feedback correct">✓ Correct: <strong>${expected}</strong></div>`;
    } else if (nu === ne) {
      recordResult('vocab', expected, true);
      fb = `<div class="feedback almost">Nearly. The accent matters: <strong>${expected}</strong>.</div>`;
    } else {
      recordResult('vocab', expected, false);
      fb = `<div class="feedback incorrect">✗ Correct answer: <strong>${expected}</strong>. You picked "<em>${answer}</em>".</div>`;
    }
    document.getElementById('feedback-area').innerHTML = fb + `<div style="margin-top:0.5rem;"><button class="primary" id="vocab-next">Next</button></div>`;
    document.getElementById('vocab-next').addEventListener('click', () => { this.next(); this.refreshStatsBlock(); });

    if (this.state.mode === 'choice') {
      document.querySelectorAll('.option-btn').forEach(b => {
        b.disabled = true;
        if (b.dataset.value === expected) b.classList.add('correct');
        else if (b === clickedBtn) b.classList.add('incorrect');
      });
    }
    this.state.awaitingNext = true;
  },

  refreshStatsBlock() {
    const block = document.getElementById('stats-block');
    if (block) block.outerHTML = this.renderStatsBlock();
  }
};

  state: { awaitingNext: false, current: null },

  init() {
    this.state = { awaitingNext: false, current: null };
    document.getElementById('main').innerHTML = `
      <div class="prompt-card">
        <div class="prompt-ask">What's the article?</div>
        <div class="prompt-main" id="noun-display">—</div>

      </div>

    `;
    document.querySelectorAll('[data-choice]').forEach(b => b.addEventListener('click', () => this.check(b.dataset.choice, b)));
    this.next();
  },

  renderStatsBlock() {
    const s = gameAggregateStats('articles');
    const acc = s.total > 0 ? Math.round((s.correct/s.total)*100) + '%' : '—';
    const weak = weakSpotsForGame('articles', it => `<span class="weak-spot">${it.key} (${Math.round(it.acc*100)}%)</span>`);
    return `<div class="game-stats" id="stats-block">
      <div class="stats-row"><span>Attempts</span><strong>${s.total}</strong></div>
      <div class="stats-row"><span>Accuracy</span><strong>${acc}</strong></div>
      <div class="weak-spots-title">Tricky nouns</div>
      <div>${weak.length ? weak.join('') : (s.total > 0 ? 'None showing yet.' : 'None yet, keep going.')}</div>
    </div>`;
  },

  next() {
    const noun = pickWeighted(DATA.articleNouns, n => weightForKey('articles', n.noun));
    this.state.current = noun;
    document.getElementById('noun-display').textContent = noun.noun;
    document.getElementById('feedback-area').innerHTML = '';
    document.querySelectorAll('[data-choice]').forEach(b => { b.disabled = false; b.classList.remove('correct','incorrect'); });
    this.state.awaitingNext = false;
  },

  check(choice, btn) {
    if (this.state.awaitingNext) return;
    const expected = this.state.current.article;
    let fb;
    if (choice === expected) {
      recordResult('articles', this.state.current.noun, true);
      fb = `<div class="feedback correct">✓ <strong>${expected} ${this.state.current.noun}</strong></div>`;
    } else {
      recordResult('articles', this.state.current.noun, false);
      fb = `<div class="feedback incorrect">✗ It's <strong>${expected} ${this.state.current.noun}</strong>${this.explain(this.state.current.noun, expected)}</div>`;
    }
    document.getElementById('feedback-area').innerHTML = fb + `<div style="margin-top:0.5rem;"><button class="primary" id="art-next">Next</button></div>`;
    document.getElementById('art-next').addEventListener('click', () => { this.next(); this.refreshStatsBlock(); });
    document.querySelectorAll('[data-choice]').forEach(b => {
      b.disabled = true;
      if (b.dataset.choice === expected) b.classList.add('correct');
      else if (b === btn) b.classList.add('incorrect');
    });
    this.state.awaitingNext = true;
  },

  explain(noun, art) {
    if (noun.endsWith('dad') || noun.endsWith('tad')) return ` (the -dad/-tad ending is reliably feminine).`;
    if (noun.endsWith('ión')) return ` (the -ión ending is reliably feminine).`;
    if (noun === 'día') return ` (día is masculine despite ending in -a, like in "buenos días").`;
    if (noun === 'agua') return ` (agua is feminine but takes el for pronunciation reasons).`;
    return '.';
  },

  refreshStatsBlock() {
    const block = document.getElementById('stats-block');
    if (block) block.outerHTML = this.renderStatsBlock();
  }
};

Games.sentenceBuilder = {
  name: 'Sentence Builder',
  description: 'Tap word tiles to construct the Spanish sentence',
  state: { awaitingNext: false, current: null, placed: [], bank: [] },

  init() {
    this.state = { awaitingNext: false, current: null, placed: [], bank: [] };
    document.getElementById('main').innerHTML = `
      <div class="prompt-card">
        <div class="prompt-ask">Translate to Spanish:</div>
        <div class="prompt-main" id="sb-english">—</div>
      </div>
      <div class="tile-target" id="sb-target"></div>
      <div class="tile-bank" id="sb-bank"></div>
      <div class="input-row">
        <button class="primary" id="sb-check" style="flex:1;">Check</button>
        <button class="primary" id="sb-clear" style="background:#7a7466;">Clear</button>
      </div>
      <div id="feedback-area"></div>
      ${this.renderStatsBlock()}
    `;
    document.getElementById('sb-check').addEventListener('click', () => this.check());
    document.getElementById('sb-clear').addEventListener('click', () => this.clear());
    this.next();
  },

  renderStatsBlock() {
    const s = gameAggregateStats('sentenceBuilder');
    const acc = s.total > 0 ? Math.round((s.correct/s.total)*100) + '%' : '—';
    return `<div class="game-stats" id="stats-block">
      <div class="stats-row"><span>Attempts</span><strong>${s.total}</strong></div>
      <div class="stats-row"><span>Accuracy</span><strong>${acc}</strong></div>
    </div>`;
  },

  next() {
    const sentence = pickWeighted(DATA.sentences, s => weightForKey('sentenceBuilder', s.es));
    this.state.current = sentence;
    document.getElementById('sb-english').textContent = sentence.en;
    const words = sentence.es.replace(/([,.!?¿¡])/g, ' $1').split(/\s+/).filter(Boolean);
    this.state.bank = shuffle(words.map((w, i) => ({ word: w, id: i, used: false })));
    this.state.placed = [];
    this.renderTiles();
    document.getElementById('feedback-area').innerHTML = '';
    document.getElementById('sb-check').textContent = 'Check';
    this.state.awaitingNext = false;
  },

  renderTiles() {
    const target = document.getElementById('sb-target');
    target.innerHTML = this.state.placed.length === 0
      ? '<span style="color:#7a7466; font-style:italic;">Tap tiles below to build the sentence</span>'
      : this.state.placed.map((t, idx) => `<button class="tile placed" data-placed-idx="${idx}">${t.word}</button>`).join('');
    target.querySelectorAll('[data-placed-idx]').forEach(el => {
      el.addEventListener('click', () => { if (!this.state.awaitingNext) this.unplace(parseInt(el.dataset.placedIdx)); });
    });
    const bank = document.getElementById('sb-bank');
    bank.innerHTML = this.state.bank.filter(t => !t.used).map(t => `<button class="tile" data-bank-id="${t.id}">${t.word}</button>`).join('');
    bank.querySelectorAll('[data-bank-id]').forEach(el => {
      el.addEventListener('click', () => { if (!this.state.awaitingNext) this.place(parseInt(el.dataset.bankId)); });
    });
  },

  place(id) {
    const tile = this.state.bank.find(t => t.id === id);
    if (!tile || tile.used) return;
    tile.used = true;
    this.state.placed.push(tile);
    this.renderTiles();
  },

  unplace(idx) {
    const tile = this.state.placed[idx];
    tile.used = false;
    this.state.placed.splice(idx, 1);
    this.renderTiles();
  },

  clear() {
    if (this.state.awaitingNext) return;
    this.state.placed.forEach(t => { t.used = false; });
    this.state.placed = [];
    this.renderTiles();
  },

  check() {
    if (this.state.awaitingNext) { this.next(); this.refreshStatsBlock(); return; }
    const built = this.state.placed.map(t => t.word).join(' ').replace(/\s+([,.!?¿¡])/g, '$1');
    const expected = this.state.current.es;
    const nu = normalize(built), ne = normalize(expected);
    let fb;
    if (built === expected) {
      recordResult('sentenceBuilder', expected, true);
      fb = `<div class="feedback correct">✓ <strong>${expected}</strong></div>`;
    } else if (nu === ne) {
      recordResult('sentenceBuilder', expected, true);
      fb = `<div class="feedback almost">Words right but capitalisation/punctuation off. Target: <strong>${expected}</strong>.</div>`;
    } else {
      recordResult('sentenceBuilder', expected, false);
      fb = `<div class="feedback incorrect">✗ You built: <em>${built}</em>. Target: <strong>${expected}</strong>.</div>`;
    }
    document.getElementById('feedback-area').innerHTML = fb;
    document.getElementById('sb-check').textContent = 'Next';
    this.state.awaitingNext = true;
  },

  refreshStatsBlock() {
    const block = document.getElementById('stats-block');
    if (block) block.outerHTML = this.renderStatsBlock();
  }
};

    </div>`;
  },

  next() {
    const entry = pickWeighted(DATA.placeActions, p => weightForKey('placeAction', p.verb));
    this.state.current = entry;
    this.state.selected = new Set();
    document.getElementById('pa-verb').textContent = entry.verb;
    document.getElementById('pa-english').textContent = entry.en;
    document.getElementById('pa-english').classList.add('hidden');
    document.getElementById('pa-hint-row').querySelector('.hint-btn').classList.remove('hidden');
    const distractors = shuffle(DATA.allPlaces.filter(p => !entry.places.includes(p))).slice(0, 6);
    this.state.shown = shuffle([...entry.places, ...distractors]);
    this.renderGrid();
    document.getElementById('feedback-area').innerHTML = '';
    document.getElementById('pa-check').textContent = 'Check selection';
    this.state.awaitingNext = false;
  },

  renderGrid() {
    const grid = document.getElementById('pa-grid');
    grid.innerHTML = this.state.shown.map(p => `<button class="check-item${this.state.selected.has(p) ? ' selected' : ''}" data-place="${p}">${p}</button>`).join('');
    grid.querySelectorAll('[data-place]').forEach(b => {
      b.addEventListener('click', () => {
        if (this.state.awaitingNext) return;
        const p = b.dataset.place;
        if (this.state.selected.has(p)) this.state.selected.delete(p);
        else this.state.selected.add(p);
        this.renderGrid();
      });
    });
  },

  check() {
    if (this.state.awaitingNext) { this.next(); this.refreshStatsBlock(); return; }
    const correct = new Set(this.state.current.places);
    const chosen = this.state.selected;
    const truePos = [...correct].filter(p => chosen.has(p));
    const falsePos = [...chosen].filter(p => !correct.has(p));
    const missed = [...correct].filter(p => !chosen.has(p));
    const perfect = truePos.length === correct.size && falsePos.length === 0;
    const grid = document.getElementById('pa-grid');
    grid.innerHTML = this.state.shown.map(p => {
      let cls = 'check-item';
      if (correct.has(p) && chosen.has(p)) cls += ' true-positive';
      else if (!correct.has(p) && chosen.has(p)) cls += ' false-positive';
      else if (correct.has(p) && !chosen.has(p)) cls += ' missed';
      return `<button class="${cls}" disabled>${p}</button>`;
    }).join('');
    recordResult('placeAction', this.state.current.verb, perfect);
    let fb;
    if (perfect) fb = `<div class="feedback correct">✓ All correct.</div>`;
    else {
      const bits = [];
      if (falsePos.length) bits.push(`extras you picked: ${falsePos.join(', ')}`);
      if (missed.length) bits.push(`places you missed: ${missed.join(', ')}`);
      fb = `<div class="feedback incorrect">✗ ${bits.join('; ')}.</div>`;
    }
    document.getElementById('feedback-area').innerHTML = fb;
    document.getElementById('pa-check').textContent = 'Next';
    this.state.awaitingNext = true;
  },

  refreshStatsBlock() {
    const block = document.getElementById('stats-block');
    if (block) block.outerHTML = this.renderStatsBlock();
  }
};

Games.dialogue = {

  description: 'Play one role in a Spanish conversation',
  state: { current: null, turnIdx: 0, awaitingNext: false },

  init() {
    this.state = { current: null, turnIdx: 0, awaitingNext: false };
    if (DATA.dialogues.length === 0) {
      document.getElementById('main').innerHTML = `<div class="empty-state">No dialogues in the database yet. Add one to DATA.dialogues to enable this game.</div>`;
      return;
    }
    if (DATA.dialogues.length === 1) {
      this.startDialogue(DATA.dialogues[0]);
    } else {
      document.getElementById('main').innerHTML = `
        <div class="prompt-card">
          <div class="prompt-ask">Pick a dialogue:</div>
        </div>
        <div class="games-grid" id="d-list"></div>
      `;
      const list = document.getElementById('d-list');
      list.innerHTML = DATA.dialogues.map(d => `<button class="game-card" data-id="${d.id}">
        <div class="game-card-title">${d.name}</div>
        <div class="game-card-desc">${d.description}</div>
        <div class="game-card-stats">Play as ${d.userRole}</div>
      </button>`).join('');
      list.querySelectorAll('[data-id]').forEach(b => b.addEventListener('click', () => {
        const d = DATA.dialogues.find(x => x.id === b.dataset.id);
        this.startDialogue(d);
      }));
    }
  },

  startDialogue(d) {
    this.state.current = d;
    this.state.turnIdx = 0;
    document.getElementById('main').innerHTML = `
      <div class="prompt-card">
        <div class="prompt-meta">${d.name} • You are ${d.userRole}</div>
      </div>
      <div id="d-history"></div>
      <div id="d-current"></div>
      <div id="feedback-area"></div>
      ${this.renderStatsBlock()}
    `;
    this.renderTurn();
  },

  renderStatsBlock() {
    const s = gameAggregateStats('dialogue');
    const acc = s.total > 0 ? Math.round((s.correct/s.total)*100) + '%' : '—';
    return `<div class="game-stats" id="stats-block">
      <div class="stats-row"><span>Attempts</span><strong>${s.total}</strong></div>
      <div class="stats-row"><span>Accuracy</span><strong>${acc}</strong></div>
    </div>`;
  },

  renderTurn() {
    const d = this.state.current;
    const history = document.getElementById('d-history');
    history.innerHTML = d.turns.slice(0, this.state.turnIdx).map(t => `
      <div class="dialogue-turn ${t.speaker === d.userRole ? 'you' : 'other'}">
        <div class="dialogue-speaker">${t.speaker}</div>
        <div class="dialogue-text">${t.es}</div>
      </div>
    `).join('');

    if (this.state.turnIdx >= d.turns.length) {
      document.getElementById('d-current').innerHTML = `<div class="feedback correct">✓ Dialogue complete.</div>
        <div style="margin-top:0.5rem;"><button class="primary" id="d-restart">Restart</button></div>`;
      document.getElementById('d-restart').addEventListener('click', () => this.startDialogue(d));
      return;
    }

    const turn = d.turns[this.state.turnIdx];
    const isUser = turn.speaker === d.userRole;
    if (isUser) {
      document.getElementById('d-current').innerHTML = `
        <div class="dialogue-turn you">
          <div class="dialogue-speaker">Your turn (${d.userRole})</div>
          <div class="dialogue-english">"${turn.en}"</div>
        </div>
        <div class="input-row">
          <input type="text" id="d-input" placeholder="Type your line in Spanish" autocomplete="off" autocapitalize="off" spellcheck="false">
          <button class="primary" id="d-submit">Say it</button>
        </div>`;
      const input = document.getElementById('d-input');
      input.focus();
      input.addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); this.checkLine(); }});
      document.getElementById('d-submit').addEventListener('click', () => this.checkLine());
    } else {
      // Auto-advance after a brief moment for other speaker's turns
      document.getElementById('d-current').innerHTML = `
        <div class="dialogue-turn other">
          <div class="dialogue-speaker">${turn.speaker}</div>
          <div class="dialogue-text">${turn.es}</div>
        </div>
        <div class="hint-row">
          <button class="hint-btn">Show meaning</button>
          <span class="hint-text hidden">${turn.en}</span>
        </div>
        <div style="margin-top:0.5rem;"><button class="primary" id="d-continue">Continue</button></div>`;
      document.getElementById('d-continue').addEventListener('click', () => {
        this.state.turnIdx++;
        this.renderTurn();
      });
    }
  },

  checkLine() {
    const input = document.getElementById('d-input').value.trim();
    if (!input) return;
    const turn = this.state.current.turns[this.state.turnIdx];
    const expected = turn.es;
    const nu = normalize(input), ne = normalize(expected);
    let fb, correct = false;
    if (input.toLowerCase() === expected.toLowerCase()) {
      correct = true;
      fb = `<div class="feedback correct">✓ <strong>${expected}</strong></div>`;
    } else if (nu === ne) {
      correct = true;
      fb = `<div class="feedback almost">Nearly. Watch accents/punctuation: <strong>${expected}</strong>.</div>`;
    } else {
      fb = `<div class="feedback incorrect">✗ Expected: <strong>${expected}</strong>. You wrote: <em>${input}</em>.</div>`;
    }
    recordResult('dialogue', `${this.state.current.id}:${this.state.turnIdx}`, correct);
    document.getElementById('feedback-area').innerHTML = fb + `<div style="margin-top:0.5rem;"><button class="primary" id="d-advance">Continue</button></div>`;
    document.getElementById('d-advance').addEventListener('click', () => {
      this.state.turnIdx++;
      document.getElementById('feedback-area').innerHTML = '';
      this.renderTurn();
      this.refreshStatsBlock();
    });
  },

  refreshStatsBlock() {
    const block = document.getElementById('stats-block');
    if (block) block.outerHTML = this.renderStatsBlock();
  }
};

  buildPool() {

    DATA.articleNouns.forEach(an => articleMap[an.noun.toLowerCase()] = an.article);

    DATA.articleNouns.forEach(an => {

      seen[key] = true;

        es: an.noun,

      });
    });

    DATA.verbs.forEach(v => {
      const key = v.inf.toLowerCase();
      if (seen[key]) return;
      seen[key] = true;
      pool.push({
        es: v.inf,
        en: v.en,
        type: 'verb',

      });
    });

  // Look up a single word for sentence parsing.
  // Tries function words, exact match, conjugated verb forms, plurals, and adjective agreement.
  lookupWord(rawWord) {
    const w = rawWord.toLowerCase()
      .replace(/[.,;:!?¿¡()"]/g, '')
      .trim();
    if (!w) return null;

    // Pure-digit check (e.g. "1995"): skip
    if (/^\d+$/.test(w)) return { es: rawWord, en: rawWord, type: 'number' };

    // Function words
    if (this.FUNCTION_WORDS[w]) {
      const fw = this.FUNCTION_WORDS[w];
      return { es: w, en: fw.en, type: 'function', meta: fw.meta };
    }

    // Match without accents (so "está" and "esta" both find it)
    const wn = normalize(w);
    if (this.FUNCTION_WORDS[wn]) {
      const fw = this.FUNCTION_WORDS[wn];
      return { es: w, en: fw.en, type: 'function', meta: fw.meta };
    }

    const pool = this.buildPool();
    // Exact match in pool
    let entry = pool.find(p => normalize(p.es) === wn);
    if (entry) return entry;

    // Conjugated verb form — search through all verbs' conjugations.
    // For reflexives the stored form includes "me/te/se/" — also try matching
    // without that prefix (so "levanto" finds the yo form of "levantarse").
    for (const v of DATA.verbs) {
      for (const tenseKey of Object.keys(v.conj)) {
        const tense = v.conj[tenseKey];
        for (const person of Object.keys(tense)) {
          const form = tense[person];
          const formNorm = normalize(form);
          const formStripped = formNorm.replace(/^(me|te|se|nos|os) /, '');
          if (formNorm === wn || formStripped === wn) {
            return {
              es: w,
              en: v.en,
              type: 'verb-form',
              infinitive: v.inf,
              person: person,
              tense: tenseKey,
              cat: v.cat
            };
          }
        }
      }
    }

    // Number text (cinco, treinta, etc.)
    for (const n of DATA.numbers) {
      if (normalize(n.es) === wn) {
        return { es: w, en: String(n.num), type: 'number', meta: 'number word' };
      }
    }

    // Reflexive form: split off pronoun prefix and try again
    // e.g. "duchame" rare, but "ducharse" should match base verb "ducharse"
    for (const pn of ['me ','te ','se ','nos ','os ']) {
      if (w.startsWith(pn)) {
        const rest = w.slice(pn.length);
        const m = this.lookupWord(rest);
        if (m) return { ...m, es: w, note: 'reflexive: ' + pn.trim() + ' ' + rest };
      }
    }

    // Plural -es: "reuniones" → "reunión", "lápices" → "lápiz" (z→c first)
    if (wn.endsWith('es') && wn.length > 3) {
      const sing1 = wn.slice(0, -2);
      const sing2 = sing1.endsWith('c') ? sing1.slice(0, -1) + 'z' : sing1;
      entry = pool.find(p => {
        const pn2 = normalize(p.es);
        return pn2 === sing1 || pn2 === sing2;
      });
      if (entry) return { ...entry, es: w, note: 'plural form' };
    }
    // Plural -s
    if (wn.endsWith('s') && wn.length > 2) {
      const sing = wn.slice(0, -1);
      entry = pool.find(p => normalize(p.es) === sing);
      if (entry) return { ...entry, es: w, note: 'plural form' };
    }

    // Adjective gender variants: bonita → bonito, bonitos → bonito, bonitas → bonito
    const variants = [];
    if (wn.endsWith('a') && wn.length > 2) variants.push(wn.slice(0, -1) + 'o');
    if (wn.endsWith('os') && wn.length > 3) variants.push(wn.slice(0, -2) + 'o');
    if (wn.endsWith('as') && wn.length > 3) variants.push(wn.slice(0, -2) + 'o');
    for (const v of variants) {
      entry = pool.find(p => normalize(p.es) === v);
      if (entry && (entry.type === 'adjective' || entry.type === 'noun')) {
        return { ...entry, es: w, note: 'agreement variant' };
      }
    }

    return null;
  },

      const t = s.correct + s.incorrect;

      return `<span class="weak-spot">${key} • ${mode} (${Math.round(it.acc*100)}%)</span>`;
    });
    return `<div class="game-stats" id="stats-block">
      <div class="stats-row"><span>Attempts</span><strong>${s.total}</strong></div>
      <div class="stats-row"><span>Accuracy</span><strong>${acc}</strong></div>
      <div class="weak-spots-title">Weak spots</div>
      <div>${weak.length ? weak.join('') : (s.total > 0 ? 'None showing yet.' : 'None yet, keep going.')}</div>
    </div>`;
  },

  refreshStatsBlock() {
    const block = document.getElementById('stats-block');
    if (block) block.outerHTML = this.renderStatsBlock();
  },

  next() {
    this.state.revealed = false;
    this.state.activeWordIdx = -1;
    if (this.state.mode === 'words') {
      this.pickWord();
    } else {
      this.pickSentence();
    }
  },

  pickWord() {
    const pool = this.buildPool();
    // Filter out entries with no English meaning (placeholders)
    const base = pool.filter(p => p.en && p.en !== '(see article quiz)');
    const f = this.state.wordFilter || 'all';
    let usable = base;
    if (f === 'nouns') usable = base.filter(p => p.type === 'noun');
    else if (f === 'verbs') usable = base.filter(p => p.type === 'verb');
    else if (f === 'weak') {
      const weak = this.weakWordKeys();
      usable = base.filter(p => weak[p.es]);
    }
    // If a filter yields nothing yet (e.g. no weak spots), fall back to the full set.
    if (!usable.length) usable = base;
    const item = pickWeighted(usable, p => weightForKey('recognition', 'words|' + p.es));
    this.state.currentItem = item;
    this.renderWordCard();
  },

  pickSentence() {
    const item = pickWeighted(DATA.sentences, s => weightForKey('recognition', 'sentences|' + s.es));
    this.state.currentItem = item;
    this.renderSentenceCard();
  },

  renderWordCard() {
    const w = this.state.currentItem;
    const card = document.getElementById('recog-card');
    card.innerHTML = `
      <div class="recog-word">${w.es}</div>
      <div class="recog-reveal-area hidden" id="reveal-area"></div>
    `;
    const ctrl = document.getElementById('recog-controls');
    ctrl.innerHTML = `
      <button class="primary" id="reveal-btn">Reveal</button>
    `;
    document.getElementById('reveal-btn').addEventListener('click', () => this.revealWord());
  },

  revealWord() {
    const w = this.state.currentItem;
    this.state.revealed = true;
    const area = document.getElementById('reveal-area');
    area.classList.remove('hidden');
    area.innerHTML = this.formatWordReveal(w);
    const ctrl = document.getElementById('recog-controls');
    ctrl.innerHTML = `
      <div class="rate-row">
        <button class="rate-btn knew" data-rate="knew">Knew it</button>
        <button class="rate-btn fuzzy" data-rate="fuzzy">Fuzzy</button>
        <button class="rate-btn didnt" data-rate="didnt">Didn't know</button>
      </div>
    `;
    ctrl.querySelectorAll('.rate-btn').forEach(b =>
      b.addEventListener('click', () => this.rateWord(b.dataset.rate))
    );
  },

  // Format detailed reveal HTML for a pool entry
  formatWordReveal(w) {
    let meaning = `<div class="recog-meaning">"${w.en}"</div>`;
    let meta = '';
    let sample = '';

    if (w.type === 'noun') {
      const artLabel = w.article ? `${w.article} ${w.es}` : w.es;
      meta = `<div class="recog-meta">Noun${w.gender ? ` · ${w.gender === 'm' ? 'masculine' : 'feminine'}` : ''}${w.topic ? ` · ${w.topic}` : ''}</div>`;
      if (w.article) sample = `<div class="recog-sample">${artLabel} (singular)</div>`;
    } else if (w.type === 'verb') {
      const catLabels = {'reg-ar':'regular -AR','reg-er':'regular -ER','reg-ir':'regular -IR',
        'stem-ie':'E→IE stem-changer','stem-ue':'O→UE stem-changer','stem-i':'E→I stem-changer',
        'irreg':'irregular','reflexive':'reflexive'};
      meta = `<div class="recog-meta">Verb · ${catLabels[w.cat] || w.cat}</div>`;
      if (w.conj && w.conj.present) {
        const p = w.conj.present;
        sample = `<div class="recog-sample">Yo ${p.yo} · Tú ${p.tu} · Él ${p.el}<br>Nos ${p.nos} · Vos ${p.vos} · Ellos ${p.ellos}</div>`;
      }
    } else if (w.type === 'adjective') {
      meta = `<div class="recog-meta">Adjective${w.topic ? ` · ${w.topic}` : ''}</div>`;
      // Show agreement forms if the base ends in -o
      if (w.es.endsWith('o')) {
        const base = w.es.slice(0, -1);
        sample = `<div class="recog-sample">${w.es} (m) · ${base}a (f) · ${w.es}s (m pl) · ${base}as (f pl)</div>`;
      } else if (w.es.endsWith('e') || w.es.endsWith('z') || w.es.endsWith('l')) {
        sample = `<div class="recog-sample">Same form for masculine and feminine. Plural adds -s or -es.</div>`;
      }
    } else if (w.type === 'phrase') {
      meta = `<div class="recog-meta">Phrase${w.topic ? ` · ${w.topic}` : ''}</div>`;
    } else if (w.type === 'place') {
      meta = `<div class="recog-meta">Place name${w.topic ? ` · ${w.topic}` : ''}</div>`;
    }

    return meaning + meta + sample;
  },

  rateWord(rating) {
    const w = this.state.currentItem;
    const key = 'words|' + w.es;
    const correct = rating === 'knew';
    recordResult('recognition', key, correct);
    // "Fuzzy" partially counts: record as incorrect once but also a correct,
    // so it tilts toward "needs review" but less heavily than "didn't know"
    if (rating === 'fuzzy') {
      recordResult('recognition', key, true);
    }
    this.refreshStatsBlock();
    setTimeout(() => this.next(), 200);
  },

  // ---- Sentence mode ----
  renderSentenceCard() {
    const s = this.state.currentItem;
    const card = document.getElementById('recog-card');
    // Split sentence into words+punctuation segments
    const words = s.es.split(/(\s+)/); // keep whitespace as separator
    const chips = words.map((segment, idx) => {
      if (/^\s+$/.test(segment)) return segment;
      return `<span class="word-chip" data-idx="${idx}">${segment}</span>`;
    }).join('');
    card.innerHTML = `
      <div class="recog-sentence">${chips}</div>
      <div id="word-popover-container"></div>
      <div class="recog-reveal-area hidden" id="reveal-area">
        <div class="recog-meaning">"${s.en}"</div>
      </div>
    `;
    card.querySelectorAll('.word-chip').forEach(chip =>
      chip.addEventListener('click', (e) => this.showWordInfo(chip))
    );

    const ctrl = document.getElementById('recog-controls');
    ctrl.innerHTML = `
      <button class="primary" id="reveal-btn">Show full translation</button>
    `;
    document.getElementById('reveal-btn').addEventListener('click', () => this.revealSentence());
  },

  showWordInfo(chip) {
    document.querySelectorAll('.word-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    const word = chip.textContent;
    const entry = this.lookupWord(word);
    const container = document.getElementById('word-popover-container');
    if (!entry) {
      container.innerHTML = `<div class="word-popover">
        <div class="pop-word">${word}</div>
        <div class="pop-meta">Not in dictionary</div>
      </div>`;
      chip.classList.add('unknown');
      return;
    }
    let popMeta = '';
    if (entry.type === 'noun') {
      popMeta = `noun${entry.gender ? ` · ${entry.gender === 'm' ? 'm' : 'f'}` : ''}${entry.note ? ` · ${entry.note}` : ''}`;
    } else if (entry.type === 'verb') {
      const catLabels = {'reg-ar':'reg -AR','reg-er':'reg -ER','reg-ir':'reg -IR',
        'stem-ie':'E→IE stem','stem-ue':'O→UE stem','stem-i':'E→I stem',
        'irreg':'irregular','reflexive':'reflexive'};
      popMeta = `verb (infinitive) · ${catLabels[entry.cat] || entry.cat}`;
    } else if (entry.type === 'verb-form') {
      const catLabels = {'reg-ar':'reg -AR','reg-er':'reg -ER','reg-ir':'reg -IR',
        'stem-ie':'E→IE','stem-ue':'O→UE','stem-i':'E→I',
        'irreg':'irregular','reflexive':'reflexive'};
      popMeta = `${entry.tense || 'present'} of ${entry.infinitive} · ${entry.person} · ${catLabels[entry.cat] || entry.cat}`;
    } else if (entry.type === 'adjective') {
      popMeta = 'adjective' + (entry.note ? ' · ' + entry.note : '');
    } else if (entry.type === 'function') {
      popMeta = entry.meta;
    } else if (entry.type === 'phrase') {
      popMeta = 'phrase';
    } else if (entry.type === 'number') {
      popMeta = entry.meta || 'number';
    } else {
      popMeta = entry.type;
    }
    container.innerHTML = `<div class="word-popover">
      <div class="pop-word">${entry.es} — "${entry.en}"</div>
      <div class="pop-meta">${popMeta}</div>
    </div>`;
  },

  revealSentence() {
    this.state.revealed = true;
    document.getElementById('reveal-area').classList.remove('hidden');
    const ctrl = document.getElementById('recog-controls');
    ctrl.innerHTML = `
      <div class="rate-row binary">
        <button class="rate-btn knew" data-rate="knew">Got it</button>
        <button class="rate-btn didnt" data-rate="didnt">Needed help</button>
      </div>
    `;
    ctrl.querySelectorAll('.rate-btn').forEach(b =>
      b.addEventListener('click', () => this.rateSentence(b.dataset.rate))
    );
  },

  rateSentence(rating) {
    const s = this.state.currentItem;
    const key = 'sentences|' + s.es;
    recordResult('recognition', key, rating === 'knew');
    this.refreshStatsBlock();
    setTimeout(() => this.next(), 200);
  }
};

// =============================================================================
// INIT
// =============================================================================

// Global hint button handler — event delegation so it works for any game
document.addEventListener('click', (e) => {
  if (e.target.classList && e.target.classList.contains('hint-btn')) {
    const row = e.target.closest('.hint-row');
    if (row) {
      const text = row.querySelector('.hint-text');
      if (text) text.classList.remove('hidden');
      e.target.classList.add('hidden');
    }
  }
});

async function init() {
  await loadProgress();
  navigateTo('home');
}
init();
</script>
